version: 2

multi-ecosystem-groups:
    infrastructure:
        schedule:
            interval: "monthly"

updates:
    - package-ecosystem: "dotnet-sdk"
      directory: "/src"
      multi-ecosystem-group: "infrastructure"

    - package-ecosystem: "nuget"
      directory: "/src"
      multi-ecosystem-group: "infrastructure"

    - package-ecosystem: "docker"
      directory: "/"
      multi-ecosystem-group: "infrastructure"

    - package-ecosystem: "github-actions"
      directory: "/"
      multi-ecosystem-group: "infrastructure"

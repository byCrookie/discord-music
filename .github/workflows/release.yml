name: Release

permissions:
    contents: write
    packages: write

on:
    workflow_dispatch:
        inputs:
            container:
                description: 'Build and push container image'
                type: boolean
                default: true
            dry_run:
                description: 'Build only; do not publish images or create a release'
                type: boolean
                default: true
            release:
                description: 'Create GitHub release'
                type: boolean
                default: true

jobs:

    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ env.GitBuildVersionSimple }}
        steps:
            -   name: Checkout repository
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    fetch-depth: 0

            -   name: Setup dotnet
                uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
                with:
                    dotnet-version: '10.0.301'

            -   name: Nerdbank.GitVersioning
                uses: dotnet/nbgv@293b36ef77470c667752f376b0515d02a92ba66c
                with:
                    setCommonVars: true
                    path: ./src

    container:
        needs: version
        if: ${{ inputs.container }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Install QEMU emulation
                run: |
                    sudo apt-get update
                    sudo apt-get install -y qemu-user-static

            -   name: Build multi-arch container image
                id: build-image
                uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056
                with:
                    image: discord-music
                    tags: ${{ needs.version.outputs.version }} latest
                    platforms: linux/amd64, linux/arm64
                    containerfiles: |
                        ./Containerfile
                    labels: |
                        org.opencontainers.image.revision=${{ github.sha }}
                        org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                        org.opencontainers.image.version=${{ needs.version.outputs.version }}
                    extra-args: |
                        --ignorefile
                        .containerignore

            -   name: Push multi-arch container image
                if: ${{ !inputs.dry_run }}
                uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c
                with:
                    image: ${{ steps.build-image.outputs.image }}
                    tags: ${{ steps.build-image.outputs.tags }}
                    registry: ghcr.io/bycrookie
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

    build:
        needs: version
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Windows
                    -   os: windows-latest
                        runtime: win-x64
                    -   os: windows-latest
                        runtime: win-x86
                    -   os: windows-latest
                        runtime: win-arm64
                    # Linux
                    -   os: ubuntu-latest
                        runtime: linux-x64
                    -   os: ubuntu-latest
                        runtime: linux-musl-x64
                    -   os: ubuntu-latest
                        runtime: linux-musl-arm64
                    -   os: ubuntu-latest
                        runtime: linux-arm
                    -   os: ubuntu-latest
                        runtime: linux-arm64
                    # macOS
                    -   os: macos-latest
                        runtime: osx-x64
                    -   os: macos-latest
                        runtime: osx-arm64
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    fetch-depth: 0

            -   name: Setup dotnet
                uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
                with:
                    dotnet-version: '10.0.301'

            -   name: Restore
                run: dotnet restore DiscordMusic.slnx

            -   name: Build
                run: dotnet build DiscordMusic.slnx --configuration Release --no-restore

            -   name: Test
                run: dotnet test --solution DiscordMusic.slnx --configuration Release --no-restore

            -   name: Publish
                run: dotnet publish src/DiscordMusic.Client/DiscordMusic.Client.csproj --configuration Release --output publish/${{ matrix.runtime }} --runtime ${{ matrix.runtime }} --self-contained true

            -   name: Zip (Windows)
                if: runner.os == 'Windows'
                run: Compress-Archive -Path ./publish/${{ matrix.runtime }}/* -DestinationPath ./publish/dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip

            -   name: Zip (Linux/macOS)
                if: runner.os != 'Windows'
                run: (cd ${{ matrix.runtime }} && zip -r ../dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip .)
                working-directory: ./publish/

            -   name: Upload artifact
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                with:
                    name: dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}
                    path: ./publish/dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip

    release:
        needs: [ version, container, build ]
        if: ${{ always() && inputs.release && !inputs.dry_run && needs.build.result == 'success' && (needs.container.result == 'success' || needs.container.result == 'skipped') }}
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Download all artifacts
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
                with:
                    path: artifacts
                    pattern: 'dm_*'
                    merge-multiple: true

            -   name: Create Release
                uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
                with:
                    name: v${{ needs.version.outputs.version }}
                    tag_name: ${{ needs.version.outputs.version }}
                    body_path: CHANGELOG.md
                    fail_on_unmatched_files: true
                    overwrite_files: false
                    files: |
                        artifacts/*.zip
                        CHANGELOG.md
                        LICENSE

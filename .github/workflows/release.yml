name: Release

permissions:
    contents: write
    packages: write

on:
    workflow_dispatch:
        inputs:
            docker:
                description: 'Build and push Docker image'
                type: boolean
                default: true
            release:
                description: 'Create GitHub release'
                type: boolean
                default: true

jobs:

    version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ env.GitBuildVersionSimple }}
        steps:
            -   name: Checkout repository
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    fetch-depth: 0

            -   name: Setup dotnet
                uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
                with:
                    dotnet-version: '10.0.302'

            -   name: Nerdbank.GitVersioning
                uses: dotnet/nbgv@293b36ef77470c667752f376b0515d02a92ba66c
                with:
                    setCommonVars: true
                    path: ./src

    docker:
        needs: version
        if: ${{ inputs.docker }}
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout repository
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Extract metadata (tags, labels)
                id: meta
                uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
                with:
                    images: ghcr.io/bycrookie/discord-music

            -   name: Set up QEMU
                uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

            -   name: Build and push multi-arch Docker image
                uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
                with:
                    context: .
                    file: ./Containerfile
                    push: true
                    platforms: linux/amd64,linux/arm64
                    tags: |
                        ghcr.io/bycrookie/discord-music:${{ needs.version.outputs.version }}
                        ghcr.io/bycrookie/discord-music:latest
                    labels: ${{ steps.meta.outputs.labels }}

    build:
        needs: version
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Windows
                    -   os: windows-latest
                        runtime: win-x64
                    -   os: windows-latest
                        runtime: win-x86
                    -   os: windows-latest
                        runtime: win-arm64
                    # Linux
                    -   os: ubuntu-latest
                        runtime: linux-x64
                    -   os: ubuntu-latest
                        runtime: linux-musl-x64
                    -   os: ubuntu-latest
                        runtime: linux-musl-arm64
                    -   os: ubuntu-latest
                        runtime: linux-arm
                    -   os: ubuntu-latest
                        runtime: linux-arm64
                    # macOS
                    -   os: macos-latest
                        runtime: osx-x64
                    -   os: macos-latest
                        runtime: osx-arm64
        runs-on: ${{ matrix.os }}
        steps:
            -   uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
                with:
                    fetch-depth: 0

            -   name: Setup dotnet
                uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
                with:
                    dotnet-version: '10.0.102'

            -   name: Restore
                run: dotnet restore DiscordMusic.slnx

            -   name: Build
                run: dotnet build DiscordMusic.slnx --configuration Release --no-restore

            -   name: Test
                run: dotnet test --solution DiscordMusic.slnx --configuration Release --no-restore

            -   name: Publish
                run: dotnet publish src/DiscordMusic.Client/DiscordMusic.Client.csproj --configuration Release --output publish/${{ matrix.runtime }} --runtime ${{ matrix.runtime }} --self-contained true

            -   name: Zip (Windows)
                if: runner.os == 'Windows'
                run: Compress-Archive -Path ./publish/${{ matrix.runtime }}/* -DestinationPath ./publish/dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip

            -   name: Zip (Linux/macOS)
                if: runner.os != 'Windows'
                run: (cd ${{ matrix.runtime }} && zip -r ../dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip .)
                working-directory: ./publish/

            -   name: Upload artifact
                uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
                with:
                    name: dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}
                    path: ./publish/dm_${{ matrix.runtime }}_${{ needs.version.outputs.version }}.zip

    release:
        needs: [ version, docker, build ]
        if: ${{ always() && inputs.release && needs.build.result == 'success' && (needs.docker.result == 'success' || needs.docker.result == 'skipped') }}
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

            -   name: Download all artifacts
                uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
                with:
                    path: artifacts
                    pattern: 'dm_*'
                    merge-multiple: true

            -   name: Create Release
                uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
                with:
                    name: v${{ needs.version.outputs.version }}
                    tag_name: ${{ needs.version.outputs.version }}
                    body_path: CHANGELOG.md
                    fail_on_unmatched_files: true
                    overwrite_files: false
                    files: |
                        artifacts/*.zip
                        CHANGELOG.md
                        LICENSE
